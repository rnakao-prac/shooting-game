name: プレビュー環境デプロイ

on:
  # PR 作成・更新時にプレビューをデプロイ
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

  # PR クローズ時（マージ・キャンセル）にプレビューを削除
  pull_request_target:
    branches:
      - main
    types: [closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ===== プレビューデプロイ =====
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: surge をインストール
        run: npm install -g surge

      # PR番号を使って一意のURLを生成してデプロイ
      - name: surge にプレビューデプロイ
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          surge . shooting-game-pr-${{ github.event.pull_request.number }}.surge.sh

      # デプロイしたURLをPRにコメントで通知
      - name: プレビューURLをPRにコメント
        uses: actions/github-script@v7
        with:
          script: |
            const url = `https://shooting-game-pr-${{ github.event.pull_request.number }}.surge.sh`;
            const body = [
              '## 🚀 プレビュー環境',
              '',
              `| 項目 | 内容 |`,
              `|---|---|`,
              `| URL | [${url}](${url}) |`,
              `| パスワード | \`shooting2024\` |`,
              `| 状態 | ✅ デプロイ完了 |`,
              '',
              '> PRがクローズされると自動削除されます。',
            ].join('\n');

            // 既存コメントを探して更新（重複防止）
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('プレビュー環境')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ===== プレビュー削除（PRクローズ時）=====
  delete-preview:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: surge をインストール
        run: npm install -g surge

      - name: プレビューを削除
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          surge teardown shooting-game-pr-${{ github.event.pull_request.number }}.surge.sh
